<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Sales Trainer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-box {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-box {
            background: rgba(255,255,255,0.05);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,150,255,0.2);
        }

        .btn-start {
            background: linear-gradient(90deg,#00bfff,#007bff);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="main-box">
    <div class="card-box">
        <h1 class="mb-4">AI Sales Simulator</h1>
        <p class="mb-4">Treinamento inteligente com avaliação automática.</p>

        <a th:href="@{/simulator}" class="btn btn-start text-white">
            Iniciar Simulação
        </a>
    </div>
</div>

</body>
</html>
